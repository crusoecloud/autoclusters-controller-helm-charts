name: integration-test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      controller_image:
        description: 'Controller image (e.g., ghcr.io/crusoecloud/autoclusters-controller:v1.0.0)'
        required: false
        default: ''

jobs:
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Helm charts
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Set up Kind
        uses: helm/kind-action@v1
        with:
          install_only: true
          version: v0.24.0

      - name: Clone integration test harness
        run: |
          git clone https://github.com/crusoecloud/autoclusters-integration-test-harness.git \
            /tmp/integration-test-harness

      - name: Determine controller image
        id: controller
        run: |
          if [ -n "${{ github.event.inputs.controller_image }}" ]; then
            echo "image=${{ github.event.inputs.controller_image }}" >> $GITHUB_OUTPUT
          else
            echo "image=ghcr.io/crusoecloud/autoclusters-controller:latest" >> $GITHUB_OUTPUT
          fi

      - name: Run integration tests
        working-directory: /tmp/integration-test-harness
        env:
          HELM_CHART_PATH: ${{ github.workspace }}
          CONTROLLER_IMAGE: ${{ steps.controller.outputs.image }}
        run: |
          echo "=============================================="
          echo "Integration Test Configuration"
          echo "=============================================="
          echo "Helm chart path: $HELM_CHART_PATH"
          echo "Controller image: $CONTROLLER_IMAGE"
          echo "=============================================="
          make ci-test-helm

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: /tmp/contract-test-results/
          retention-days: 7

      - name: Cleanup
        if: always()
        working-directory: /tmp/integration-test-harness
        run: make test-contract-teardown || true
