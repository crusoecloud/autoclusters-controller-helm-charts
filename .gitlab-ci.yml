stages:
  - lint
  - integration-test

variables:
  # Set to "true" in CI/CD settings to enforce version bump checks on MRs
  VERSION_CHECK_ENABLED: "false"
  # Controller image for integration tests (override in CI/CD settings or MR variables)
  CONTROLLER_IMAGE_REPO: "ghcr.io/crusoecloud/autoclusters-controller"
  CONTROLLER_IMAGE_TAG: "1.0.0"
  CONTROLLER_IMAGE: "${CONTROLLER_IMAGE_REPO}:${CONTROLLER_IMAGE_TAG}"

helm-lint:
  stage: lint
  image: alpine/helm:3.16
  script:
    - helm lint charts/autoclusters-controller
    - helm lint charts/crusoe-npd
    - helm dependency update charts/autoclusters-argo-workflows
    - helm lint charts/autoclusters-argo-workflows
  rules:
    - if: '$CI_MERGE_REQUEST_ID'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

version-check:
  stage: lint
  image: alpine:3.20
  script:
    - apk add --no-cache git
    - |
      if [ "$VERSION_CHECK_ENABLED" != "true" ]; then
        echo "Version check disabled (VERSION_CHECK_ENABLED=$VERSION_CHECK_ENABLED). Skipping."
        exit 0
      fi
      FAILED=0
      for chart in charts/*/; do
        chart_name=$(basename "$chart")
        # Check if any chart file changed (excluding Chart.yaml itself)
        if git diff origin/$CI_DEFAULT_BRANCH --name-only -- "$chart" | grep -v Chart.yaml | grep -q .; then
          # Check if Chart.yaml version was bumped
          if ! git diff origin/$CI_DEFAULT_BRANCH -- "$chart/Chart.yaml" | grep -q '+version:'; then
            echo "ERROR: $chart_name has changes but Chart.yaml version was not bumped"
            FAILED=1
          fi
        fi
      done
      if [ "$FAILED" -eq 1 ]; then exit 1; fi
      echo "All changed charts have version bumps."
  rules:
    - if: '$CI_MERGE_REQUEST_ID'

integration-test:
  stage: integration-test
  trigger:
    project: crusoeenergy/island/managed/autoclusters-integration-test-harness
    branch: main
    strategy: depend
  variables:
    CONTROLLER_IMAGE: "${CONTROLLER_IMAGE}"
    HELM_CHART_REPO: "https://gitlab.com/crusoeenergy/infrastructure/sre/helm_charts/autoclusters-controller-helm-charts"
    HELM_CHART_REF: "${CI_COMMIT_SHA}"
  rules:
    - if: '$CI_MERGE_REQUEST_ID'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
