stages:
  - lint
  - publish

variables:
  GHCR_REGISTRY: ghcr.io/crusoe-cloud
  OCI_REPO: oci://${GHCR_REGISTRY}/autoclusters-controller-helm-charts

helm-lint:
  stage: lint
  image: alpine/helm:3.14
  script:
    - helm lint charts/autoclusters-controller
    - helm lint charts/crusoe-npd
    - helm dependency update charts/autoclusters-argo-workflows
    - helm lint charts/autoclusters-argo-workflows
  rules:
    - if: '$CI_MERGE_REQUEST_ID'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

publish-charts:
  stage: publish
  image: alpine/helm:3.14
  script:
    - echo "${GHCR_TOKEN}" | helm registry login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
    - helm package charts/autoclusters-controller -d /tmp/packages/
    - helm package charts/crusoe-npd -d /tmp/packages/
    - helm dependency update charts/autoclusters-argo-workflows
    - helm package charts/autoclusters-argo-workflows -d /tmp/packages/
    - |
      for pkg in /tmp/packages/*.tgz; do
        helm push "$pkg" "${OCI_REPO}"
      done
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
