# Upstream argo-workflows subchart values
argo-workflows:
  server:
    enabled: false
  controller:
    workflowNamespaces:
      - crusoe-system
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    metricsConfig:
      enabled: true
      port: 9090
    workflowDefaults:
      spec:
        podGC:
          strategy: OnPodCompletion
        ttlStrategy:
          secondsAfterCompletion: 86400
          secondsAfterSuccess: 86400
          secondsAfterFailure: 172800
    clusterWorkflowTemplates:
      enabled: false
  crds:
    install: true
    keep: true
  singleNamespace: true
  workflow:
    serviceAccount:
      create: true
      name: argo

# WorkflowTemplate configuration
workflowTemplates:
  enabled: true

# GPU resource configuration
# The controller dynamically detects actual GPU count from node capacity
# and overrides this via workflow-level podSpecPatch at submission time.
# This value serves as the default for standalone template usage.
gpuResources:
  defaultGPUCount: 8

# Deadline configuration
# Per-template deadline caps individual test execution time.
# The controller sets a separate workflow-level deadline (default 7200s)
# that caps total workflow runtime across all sequential tests.
deadlines:
  templateDeadlineSeconds: 5400

# Container images for GPU test templates.
# Tags must be set explicitly — Chart appVersion tracks upstream Argo (3.7.9), not test images.
images:
  dcgm:
    repository: ghcr.io/crusoecloud/crusoe-dcgm
    tag: "1.0.0"
    # Optional: pin to a specific image digest (overrides tag when set)
    digest: ""
  nvbandwidth:
    repository: ghcr.io/crusoecloud/nvbandwidth
    tag: "1.0.0"
    # Optional: pin to a specific image digest (overrides tag when set)
    digest: ""

# Per-SKU NVLink bandwidth thresholds (GB/s per GPU pair).
# Used by the nvbandwidth WorkflowTemplate. Pattern is matched against the node SKU label (case-insensitive).
# Baselines from nvbandwidth device_to_device_memcpy_read_ce, threshold = baseline x 0.8.
nvlinkThresholds:
  - pattern: "*a100*sxm*"
    threshold: 220
  - pattern: "*h100*sxm*"
    threshold: 316
  - pattern: "*h200*sxm*"
    threshold: 316
defaultNvlinkThreshold: 50

# SKU patterns to skip ALL tests for (glob syntax, matched case-insensitively).
# Nodes matching any pattern exit immediately with a "skipped" result.
skippedSKUPatterns:
  - "b200*"

# SKU patterns to skip only nvbandwidth for (glob syntax, case-insensitive).
# PCIe-only GPUs (no NVLink) get no value from device-to-device bandwidth tests
# since DCGM Level 2 already validates PCIe integration.
nvbandwidthSkippedSKUPatterns:
  - "*l40s*"

# PriorityClass for GPU test workflows
priorityClass:
  create: true
  name: scavenger
  value: -1000
  preemptionPolicy: PreemptLowerPriority
