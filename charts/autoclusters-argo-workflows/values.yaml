# Upstream argo-workflows subchart values
argo-workflows:
  server:
    enabled: false
  controller:
    workflowNamespaces:
      - crusoe-system
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    metricsConfig:
      enabled: true
      port: 9090
    workflowDefaults:
      spec:
        podGC:
          strategy: OnPodCompletion
        ttlStrategy:
          secondsAfterCompletion: 86400
          secondsAfterSuccess: 86400
          secondsAfterFailure: 172800
    clusterWorkflowTemplates:
      enabled: false
  crds:
    install: true
    keep: true
  singleNamespace: true
  workflow:
    serviceAccount:
      create: true
      name: argo

# WorkflowTemplate configuration
workflowTemplates:
  enabled: true

# GPU resource configuration
# The controller dynamically detects actual GPU count from node capacity
# and overrides this via workflow-level podSpecPatch at submission time.
# This value serves as the default for standalone template usage.
gpuResources:
  defaultGPUCount: 8

# Deadline configuration
# Per-template deadline caps individual test execution time.
# The controller sets a separate workflow-level deadline (default 7200s)
# that caps total workflow runtime across all sequential tests.
deadlines:
  templateDeadlineSeconds: 5400

# PriorityClass for GPU test workflows
priorityClass:
  create: true
  name: scavenger
  value: -1000
  preemptionPolicy: PreemptLowerPriority
