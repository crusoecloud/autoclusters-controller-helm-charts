{{- if .Values.workflowTemplates.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: gpu-dcgm-diag
  namespace: {{ .Release.Namespace }}
  labels:
    app: autoclusters
    test-type: gpu
spec:
  activeDeadlineSeconds: 1800
  entrypoint: run-test
  arguments:
    parameters:
      - name: nodeName
      - name: sku
  podSpecPatch: |
    priorityClassName: {{ .Values.priorityClass.name }}
  templates:
    - name: run-test
      container:
        image: nvcr.io/nvidia/cloud-native/dcgm:4.2.3-1-ubuntu22.04
        command: ["/bin/bash", "-c"]
        args:
          - |
            set -e

            echo "=== DCGM Level 3 Diagnostics ==="
            echo "Running comprehensive GPU diagnostics (stress test, memory, PCIe, NVLink, ECC)..."

            # Run Level 3 DCGMI diagnostics — includes sustained stress test,
            # full memory scan, PCIe bandwidth, NVLink pairwise bandwidth, ECC checks
            OUTPUT=$(dcgmi diag -r 3 2>&1) || true
            echo "$OUTPUT"

            if echo "$OUTPUT" | grep -qE "Fail|Warn"; then
              echo "One or more GPUs failed Level 3 diagnostics"
              exit 1
            fi

            echo "All GPUs passed Level 3 diagnostics"
        resources:
          limits:
            cpu: "1"
            nvidia.com/gpu: "8"
          requests:
            cpu: "1"
            nvidia.com/gpu: "8"
      continueOn:
        failed: true
{{- end }}
