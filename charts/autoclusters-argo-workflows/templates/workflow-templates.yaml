{{- if .Values.workflowTemplates.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: gpu-dcgm-diag
  namespace: {{ .Release.Namespace }}
  labels:
    app: autoclusters
    test-type: gpu
spec:
  activeDeadlineSeconds: 5400
  entrypoint: run-test
  arguments:
    parameters:
      - name: nodeName
      - name: sku
  podSpecPatch: |
    priorityClassName: {{ .Values.priorityClass.name }}
  templates:
    - name: run-test
      outputs:
        parameters:
          - name: test-results
            valueFrom:
              path: /tmp/test-results.json
              default: '{"status":"error","error":"output file not written"}'
      container:
        image: nvcr.io/nvidia/cloud-native/dcgm:4.2.3-1-ubuntu22.04
        command: ["/bin/bash", "-c"]
        args:
          - |
            set -e

            echo "=== DCGM Level 2 Diagnostics ==="

            # libnuma is required for PCIe bandwidth tests (BwChecker) to bind
            # NUMA nodes. Without it, BwChecker spins forever at 0% GPU utilization.
            # ForceIPv4: some cluster DNS resolvers return IPv6-only records for
            # archive.ubuntu.com but nodes lack IPv6 connectivity, causing apt to hang.
            echo "Installing libnuma..."
            apt-get -o Acquire::ForceIPv4=true update -qq && apt-get -o Acquire::ForceIPv4=true install -y -qq libnuma1 > /dev/null 2>&1

            echo "Running GPU deployment checks (memory, PCIe/NVLink integration)..."

            # Detect GPU count for -i flag (cloud VMs don't expose NvSwitch
            # devices, so we must target GPUs explicitly to avoid DCGM hanging
            # on NvSwitch attachment)
            GPU_COUNT=$(nvidia-smi -L | wc -l)
            GPU_IDS=$(seq -s, 0 $((GPU_COUNT - 1)))
            echo "Detected $GPU_COUNT GPUs, testing gpu:$GPU_IDS"

            # Run Level 2 DCGMI diagnostics — deployment checks:
            # memory bandwidth, PCIe/NVLink integration, ECC checks
            # -i gpu:N targets only GPUs, skipping NvSwitch entity checks
            # tee streams output in real-time while capturing for pass/fail check
            DCGM_EXIT=0
            OUTPUT=$(dcgmi diag -r 2 -v -i "gpu:$GPU_IDS" 2>&1 | tee /dev/stderr) || DCGM_EXIT=$?

            # dcgmi exit codes (from source):
            #   0 (DCGM_ST_OK)              = all tests passed
            #   226 (DCGM_ST_NVVS_ERROR)    = test failures detected
            #   Other non-zero              = infra error (timeout, killed, bad params)
            # We check both the exit code AND grep for Fail/Warn in case they diverge.
            if [ "$DCGM_EXIT" -ne 0 ]; then
              echo "dcgmi exited with code $DCGM_EXIT"
            fi

            # Parse DCGM table output for structured results.
            # dcgmi diag result strings (from source): "Pass", "Fail", "Warn", "Skip", "Not Run"
            # Output sections: Deployment (software), Hardware (memory), Integration (pcie)
            CURRENT_SUBTEST=""
            OVERALL_FAIL=0
            FAILED_GPU_COUNT=0

            # Per-GPU tracking: arrays indexed by GPU ID
            declare -A GPU_STATUS       # gpu_id -> "pass"|"fail"
            declare -A GPU_SUBTESTS     # "gpu_id:subtest" -> "pass"|"fail"
            declare -A GPU_PCIE_G2H     # gpu_id -> GPU-to-Host bandwidth
            declare -A GPU_PCIE_H2G     # gpu_id -> Host-to-GPU bandwidth
            declare -A GPU_PCIE_BIDIR   # gpu_id -> bidirectional bandwidth

            # Initialize all GPUs as pass
            for i in $(seq 0 $((GPU_COUNT - 1))); do
              GPU_STATUS[$i]="pass"
            done

            while IFS= read -r line; do
              # Track current section by header lines
              if echo "$line" | grep -q "Deployment"; then
                CURRENT_SUBTEST="software"
              elif echo "$line" | grep -q "Hardware"; then
                CURRENT_SUBTEST="memory"
              elif echo "$line" | grep -q "Integration"; then
                CURRENT_SUBTEST="pcie"
              fi

              # Extract per-GPU status: "GPU0: Pass" or "GPU1: Fail"
              if echo "$line" | grep -qE "GPU[0-9]+:"; then
                GPU_ID=$(echo "$line" | grep -oE "GPU([0-9]+)" | grep -oE "[0-9]+")
                RESULT=$(echo "$line" | grep -oE "(Pass|Fail|Warn|Skip)" || true)
                if [ -n "$GPU_ID" ] && [ -n "$CURRENT_SUBTEST" ]; then
                  if [ "$RESULT" = "Fail" ] || [ "$RESULT" = "Warn" ]; then
                    GPU_SUBTESTS["${GPU_ID}:${CURRENT_SUBTEST}"]="fail"
                    GPU_STATUS[$GPU_ID]="fail"
                  elif [ "$RESULT" = "Pass" ]; then
                    GPU_SUBTESTS["${GPU_ID}:${CURRENT_SUBTEST}"]="pass"
                  fi
                fi
              fi

              # Extract PCIe bandwidth values from Info lines
              if echo "$line" | grep -q "GPU to Host bandwidth"; then
                GPU_ID=$(echo "$line" | grep -oE "GPU([0-9]+)" | grep -oE "[0-9]+")
                BW=$(echo "$line" | grep -oE "[0-9]+\.[0-9]+ GB/s" | grep -oE "[0-9]+\.[0-9]+")
                [ -n "$GPU_ID" ] && [ -n "$BW" ] && GPU_PCIE_G2H[$GPU_ID]="$BW"
              elif echo "$line" | grep -q "Host to GPU bandwidth"; then
                GPU_ID=$(echo "$line" | grep -oE "GPU([0-9]+)" | grep -oE "[0-9]+")
                BW=$(echo "$line" | grep -oE "[0-9]+\.[0-9]+ GB/s" | grep -oE "[0-9]+\.[0-9]+")
                [ -n "$GPU_ID" ] && [ -n "$BW" ] && GPU_PCIE_H2G[$GPU_ID]="$BW"
              elif echo "$line" | grep -q "bidirectional bandwidth"; then
                GPU_ID=$(echo "$line" | grep -oE "GPU([0-9]+)" | grep -oE "[0-9]+")
                BW=$(echo "$line" | grep -oE "[0-9]+\.[0-9]+ GB/s" | grep -oE "[0-9]+\.[0-9]+")
                [ -n "$GPU_ID" ] && [ -n "$BW" ] && GPU_PCIE_BIDIR[$GPU_ID]="$BW"
              fi
            done <<< "$OUTPUT"

            # Build JSON output
            GPUS_JSON=""
            FAILED_TESTS_SET=""
            for i in $(seq 0 $((GPU_COUNT - 1))); do
              [ -n "$GPUS_JSON" ] && GPUS_JSON="${GPUS_JSON},"
              SW_STATUS="${GPU_SUBTESTS[${i}:software]:-pass}"
              MEM_STATUS="${GPU_SUBTESTS[${i}:memory]:-pass}"
              PCIE_STATUS="${GPU_SUBTESTS[${i}:pcie]:-pass}"
              G2H="${GPU_PCIE_G2H[$i]:-0}"
              H2G="${GPU_PCIE_H2G[$i]:-0}"
              BIDIR="${GPU_PCIE_BIDIR[$i]:-0}"

              if [ "${GPU_STATUS[$i]}" = "fail" ]; then
                FAILED_GPU_COUNT=$((FAILED_GPU_COUNT + 1))
                OVERALL_FAIL=1
                # Track which subtests failed
                [ "$SW_STATUS" = "fail" ] && FAILED_TESTS_SET="${FAILED_TESTS_SET} software"
                [ "$MEM_STATUS" = "fail" ] && FAILED_TESTS_SET="${FAILED_TESTS_SET} memory"
                [ "$PCIE_STATUS" = "fail" ] && FAILED_TESTS_SET="${FAILED_TESTS_SET} pcie"
              fi

              GPUS_JSON="${GPUS_JSON}{\"gpu_id\":${i},\"status\":\"${GPU_STATUS[$i]}\",\"tests\":{\"software\":\"${SW_STATUS}\",\"memory\":\"${MEM_STATUS}\",\"pcie\":\"${PCIE_STATUS}\"},\"pcie_gpu_to_host_gbps\":${G2H},\"pcie_host_to_gpu_gbps\":${H2G},\"pcie_bidirectional_gbps\":${BIDIR}}"
            done

            # Deduplicate failed test names
            FAILED_TESTS_JSON=""
            for t in $(echo "$FAILED_TESTS_SET" | tr ' ' '\n' | sort -u); do
              [ -z "$t" ] && continue
              [ -n "$FAILED_TESTS_JSON" ] && FAILED_TESTS_JSON="${FAILED_TESTS_JSON},"
              FAILED_TESTS_JSON="${FAILED_TESTS_JSON}\"${t}\""
            done

            # Belt-and-suspenders: also fail if dcgmi exited non-zero even if
            # we didn't find Fail/Warn in the output (e.g. exit code 226 = NVVS error)
            if [ "$DCGM_EXIT" -ne 0 ] && [ "$OVERALL_FAIL" -eq 0 ]; then
              echo "WARNING: dcgmi exited $DCGM_EXIT but no Fail/Warn found in output"
              OVERALL_FAIL=1
            fi

            if [ "$OVERALL_FAIL" -eq 1 ]; then
              RESULT_STATUS="fail"
              SUMMARY="${FAILED_GPU_COUNT}/${GPU_COUNT} GPUs failed Level 2 diagnostics"
            else
              RESULT_STATUS="pass"
              SUMMARY="All GPUs passed Level 2 diagnostics"
            fi

            cat > /tmp/test-results.json <<RESULTS_EOF
            {"status":"${RESULT_STATUS}","gpu_count":${GPU_COUNT},"subtests":["software","memory","pcie"],"gpus":[${GPUS_JSON}],"failed_gpu_count":${FAILED_GPU_COUNT},"failed_tests":[${FAILED_TESTS_JSON}],"summary":"${SUMMARY}"}
            RESULTS_EOF

            if [ "$OVERALL_FAIL" -eq 1 ]; then
              echo "$SUMMARY"
              exit 1
            fi

            echo "$SUMMARY"
        resources:
          limits:
            cpu: "1"
            # Todo: support different skus
            # The controller also hardcodes 8 in the podSpecPatch at submission time.
            nvidia.com/gpu: "8"
          requests:
            cpu: "1"
            nvidia.com/gpu: "8"
      # NPD reads individual step phases to determine pass/fail per test.
      # Without continueOn the workflow short-circuits on first failure and skips remaining tests.
      continueOn:
        failed: true
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: nvbandwidth
  namespace: {{ .Release.Namespace }}
  labels:
    app: autoclusters
    test-type: gpu
spec:
  activeDeadlineSeconds: 5400
  entrypoint: run-test
  arguments:
    parameters:
      - name: nodeName
      - name: sku
  podSpecPatch: |
    priorityClassName: {{ .Values.priorityClass.name }}
  templates:
    - name: run-test
      inputs:
        parameters:
          - name: nodeName
          - name: sku
      outputs:
        parameters:
          - name: test-results
            valueFrom:
              path: /tmp/test-results.json
              default: '{"status":"error","error":"output file not written"}'
      container:
        image: ghcr.io/crusoe-cloud/nvbandwidth:v0.8
        command: ["/bin/bash", "-c"]
        args:
          - |
            set -e

            echo "=== NVBandwidth Test ==="
            SKU="{{`{{inputs.parameters.sku}}`}}"

            # Per-SKU NVLink bandwidth thresholds (GB/s per GPU pair).
            # Baselines from nvbandwidth device_to_device_memcpy_read_ce, threshold = baseline × 0.8.
            # Baseline sources:
            #   A100 SXM: ~275 GB/s (NVLink 3.0, measured on pphelan-doca-test Mar 2026)
            #   H100 SXM: ~395 GB/s (NVLink 4.0, measured on autocluster-active-testing Mar 2026)
            #   H200 SXM: ~395 GB/s (same NVLink 4.0 as H100)
            case "$SKU" in
              *a100*sxm*) THRESHOLD=220 ;;
              *h100*sxm*) THRESHOLD=316 ;;
              *h200*sxm*) THRESHOLD=316 ;;
              *) echo "WARNING: Unknown SKU '$SKU', using conservative threshold"; THRESHOLD=50 ;;
            esac

            echo "SKU: $SKU | Per-pair threshold: ${THRESHOLD} GB/s"
            echo "Running device_to_device_memcpy_read_ce..."

            OUTPUT=$(nvbandwidth -t device_to_device_memcpy_read_ce 2>&1 | tee /dev/stderr) || true

            # Check for runtime errors first.
            # nvbandwidth error formats (from source): [CUDA_ERROR_*], NVML_ERROR:, ASSERT
            if echo "$OUTPUT" | grep -qiE "CUDA_ERROR|NVML_ERROR|^ASSERT"; then
              echo "NVBandwidth FAILED: runtime error detected"
              cat > /tmp/test-results.json <<RESULTS_EOF
            {"status":"fail","threshold_gbps":${THRESHOLD},"min_bandwidth_gbps":0,"gpu_pair_count":0,"failed_pair_count":0,"sku":"${SKU}","error":"runtime error"}
            RESULTS_EOF
              exit 1
            fi

            # Parse bandwidth matrix: lines starting with a GPU index (e.g. " 0  395.07 ...")
            # Extract numeric values and compare each against the threshold
            FAILED=0
            FAILED_COUNT=0
            PAIR_COUNT=0
            MIN_BW=999999
            while IFS= read -r line; do
              for val in $line; do
                case "$val" in
                  [0-9]*.[0-9]*) ;;  # match float values only
                  *) continue ;;
                esac
                PAIR_COUNT=$((PAIR_COUNT + 1))
                if awk "BEGIN{exit(!($val < $THRESHOLD))}"; then
                  echo "FAIL: GPU pair bandwidth ${val} GB/s < threshold ${THRESHOLD} GB/s"
                  FAILED=1
                  FAILED_COUNT=$((FAILED_COUNT + 1))
                fi
                # Track minimum
                MIN_BW=$(awk "BEGIN{print ($val < $MIN_BW) ? $val : $MIN_BW}" <<< "")
              done
            done <<< "$(echo "$OUTPUT" | grep -E '^ [0-9]')"

            echo "Checked $PAIR_COUNT GPU pairs, min bandwidth: ${MIN_BW} GB/s"

            # Write structured results for controller metrics
            if [ "$FAILED" -eq 1 ]; then
              RESULT_STATUS="fail"
            else
              RESULT_STATUS="pass"
            fi
            cat > /tmp/test-results.json <<RESULTS_EOF
            {"status":"${RESULT_STATUS}","threshold_gbps":${THRESHOLD},"min_bandwidth_gbps":${MIN_BW},"gpu_pair_count":${PAIR_COUNT},"failed_pair_count":${FAILED_COUNT},"sku":"${SKU}"}
            RESULTS_EOF

            if [ "$FAILED" -eq 1 ]; then
              echo "NVBandwidth FAILED: one or more GPU pairs below ${THRESHOLD} GB/s threshold"
              exit 1
            fi

            echo "NVBandwidth PASSED: all GPU pairs >= ${THRESHOLD} GB/s"
        resources:
          limits:
            cpu: "1"
            # All current Crusoe GPU SKUs have 8 GPUs per node.
            # The controller also hardcodes 8 in the podSpecPatch at submission time.
            nvidia.com/gpu: "8"
          requests:
            cpu: "1"
            nvidia.com/gpu: "8"
      # NPD reads individual step phases to determine pass/fail per test.
      # Without continueOn the workflow short-circuits on first failure and skips remaining tests.
      continueOn:
        failed: true
{{- end }}
