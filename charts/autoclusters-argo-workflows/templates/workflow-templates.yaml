{{- if .Values.workflowTemplates.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: gpu-dcgm-diag
  namespace: {{ .Release.Namespace }}
  labels:
    app: autoclusters
    test-type: gpu
spec:
  activeDeadlineSeconds: 5400
  entrypoint: run-test
  arguments:
    parameters:
      - name: nodeName
      - name: sku
  podSpecPatch: |
    priorityClassName: {{ .Values.priorityClass.name }}
  templates:
    - name: run-test
      container:
        image: nvcr.io/nvidia/cloud-native/dcgm:4.2.3-1-ubuntu22.04
        command: ["/bin/bash", "-c"]
        args:
          - |
            set -e

            echo "=== DCGM Level 2 Diagnostics ==="
            echo "Running GPU deployment checks (memory, PCIe/NVLink integration)..."

            # Detect GPU count for -i flag (cloud VMs don't expose NvSwitch
            # devices, so we must target GPUs explicitly to avoid DCGM hanging
            # on NvSwitch attachment)
            GPU_COUNT=$(nvidia-smi -L | wc -l)
            GPU_IDS=$(seq -s, 0 $((GPU_COUNT - 1)))
            echo "Detected $GPU_COUNT GPUs, testing gpu:$GPU_IDS"

            # Run Level 2 DCGMI diagnostics — deployment checks:
            # memory bandwidth, PCIe/NVLink integration, ECC checks
            # -i gpu:N targets only GPUs, skipping NvSwitch entity checks
            # tee streams output in real-time while capturing for pass/fail check
            OUTPUT=$(dcgmi diag -r 2 -i "gpu:$GPU_IDS" 2>&1 | tee /dev/stderr) || true

            if echo "$OUTPUT" | grep -qE "Fail|Warn"; then
              echo "One or more GPUs failed Level 2 diagnostics"
              exit 1
            fi

            echo "All GPUs passed Level 2 diagnostics"
        resources:
          limits:
            cpu: "1"
            # Todo: support different skus
            # The controller also hardcodes 8 in the podSpecPatch at submission time.
            nvidia.com/gpu: "8"
          requests:
            cpu: "1"
            nvidia.com/gpu: "8"
      # NPD reads individual step phases to determine pass/fail per test.
      # Without continueOn the workflow short-circuits on first failure and skips remaining tests.
      continueOn:
        failed: true
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: nvbandwidth
  namespace: {{ .Release.Namespace }}
  labels:
    app: autoclusters
    test-type: gpu
spec:
  activeDeadlineSeconds: 5400
  entrypoint: run-test
  arguments:
    parameters:
      - name: nodeName
      - name: sku
  podSpecPatch: |
    priorityClassName: {{ .Values.priorityClass.name }}
  templates:
    - name: run-test
      container:
        image: nvcr.io/nvidia/nvbandwidth:v0.5
        command: ["/bin/bash", "-c"]
        args:
          - |
            set -e

            echo "=== NVBandwidth Test ==="
            echo "Running NVLink bandwidth test (device-to-device memcpy)..."

            # Run nvbandwidth device-to-device copy test to verify NVLink health
            # tee streams output in real-time while capturing for pass/fail check
            OUTPUT=$(nvbandwidth -t device_to_device_memcpy_read_ce -v 2>&1 | tee /dev/stderr) || true

            if echo "$OUTPUT" | grep -qiE "error|fail"; then
              echo "NVBandwidth test failed"
              exit 1
            fi

            echo "NVBandwidth test passed"
        resources:
          limits:
            cpu: "1"
            # All current Crusoe GPU SKUs have 8 GPUs per node.
            # The controller also hardcodes 8 in the podSpecPatch at submission time.
            nvidia.com/gpu: "8"
          requests:
            cpu: "1"
            nvidia.com/gpu: "8"
      # NPD reads individual step phases to determine pass/fail per test.
      # Without continueOn the workflow short-circuits on first failure and skips remaining tests.
      continueOn:
        failed: true
{{- end }}
