# Default values for autoclusters-controller.

replicaCount: 2

image:
  repository: ghcr.io/crusoe-cloud/autoclusters-controller
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""
  # Optional: pin to a specific image digest (overrides tag when set)
  digest: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8443

# Debug server port
debugPort: 8082

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Controller configuration
controller:
  # Required for multi-replica deployment to prevent duplicate workflow submissions.
  leaderElect: true
  metrics:
    enabled: true
    bindAddress: ":8443"
    secure: false
  healthProbe:
    bindAddress: ":8081"

# PriorityClassName for the controller deployment itself
priorityClassName: system-cluster-critical
