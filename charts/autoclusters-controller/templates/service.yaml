apiVersion: v1
kind: Service
metadata:
  name: {{ include "autoclusters-controller.fullname" . }}
  labels:
    {{- include "autoclusters-controller.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: https
      protocol: TCP
      name: https
    - port: 8081
      targetPort: health
      protocol: TCP
      name: health
  selector:
    {{- include "autoclusters-controller.selectorLabels" . | nindent 4 }}
