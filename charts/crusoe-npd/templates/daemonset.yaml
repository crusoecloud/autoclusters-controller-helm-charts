apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "crusoe-npd.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crusoe-npd.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "crusoe-npd.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "crusoe-npd.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "crusoe-npd.serviceAccountName" . }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: node-problem-detector
          {{- if .Values.image.digest }}
          image: "{{ .Values.image.repository }}@{{ .Values.image.digest }}"
          {{- else }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop:
                - ALL
          command:
            - /node-problem-detector
          args:
            - --logtostderr
            - --port={{ .Values.port }}
            - --config.system-log-monitor=
            {{- range .Values.monitors }}
            - --config.custom-plugin-monitor=/config/{{ .name }}-monitor.json
            {{- end }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NAMESPACE
              value: {{ .Values.workflowNamespace | quote }}
          ports:
            - containerPort: {{ .Values.port }}
              name: http
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- range .Values.monitors }}
            - name: config
              mountPath: /config/{{ .name }}-monitor.json
              subPath: {{ .name }}-monitor.json
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "crusoe-npd.fullname" . }}-config
