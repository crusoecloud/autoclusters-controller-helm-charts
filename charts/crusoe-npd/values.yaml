# Default values for crusoe-npd.
# Deploys a "lobotomized" Node Problem Detector that ONLY runs custom GPU
# health plugin monitors (no default system log monitors).
# The check_gpu_health.sh script is baked into the Docker image, not loaded
# via ConfigMap. Only the JSON monitor configs are templated here.

image:
  repository: ghcr.io/crusoecloud/crusoe-npd
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""
  pullPolicy: Always
  # Optional: pin to a specific image digest (overrides tag when set)
  digest: ""

nameOverride: ""
fullnameOverride: ""

# Port for NPD metrics/health endpoint (avoids conflict with standard NPD on 20256)
port: 20258

# Namespace where Argo Workflows are created by autoclusters-controller
workflowNamespace: crusoe-system

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi

# Monitor definitions — each entry generates a ConfigMap key, volume mount,
# and --config.custom-plugin-monitor arg. Adding a new test = add an entry here.
# The check_gpu_health.sh script is generic (takes test-name + condition-type as args).
monitors:
  - name: gpu-dcgm-diag
    conditionType: GPUDCGMUnhealthy
    conditionReason: GPUDCGMTestPassed
    conditionMessage: "GPU DCGM Level 2 diagnostics passed"
    failedReason: GPUDCGMTestFailed
  - name: nvbandwidth
    conditionType: GPUNVBandwidthUnhealthy
    conditionReason: NVBandwidthTestPassed
    conditionMessage: "NVBandwidth test passed"
    failedReason: NVBandwidthTestFailed

# Plugin defaults applied to all monitors (can be overridden per-monitor)
pluginDefaults:
  invokeInterval: "60s"
  # Timeout for the shell script invocation (kubectl get workflow), not for the actual GPU test duration.
  timeout: "10s"
  maxOutputLength: 256
  concurrency: 1
  skipInitialStatus: true

# Run on all worker nodes
tolerations:
  - operator: Exists

nodeSelector: {}
